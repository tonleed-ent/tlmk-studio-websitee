  <style>
    /* 404-only treatment — centred hero with a viewfinder around the number */
    .hero--404 { align-items: center; justify-content: center; text-align: center; }
    .hero--404 .hero__content { max-width: 760px; margin: 0 auto; padding: 96px var(--pad-x); }

    .err404__frame { position: relative; display: inline-block; padding: 16px 28px; margin-bottom: 12px; }

    .err404 {
      display: block;
      font-size: clamp(88px, 22vw, 200px);
      font-weight: 300;
      line-height: 0.9;
      letter-spacing: -0.03em;
      animation: err404Focus 1.8s ease-out both;
    }

    /* Viewfinder corner brackets */
    .err404__frame::before,
    .err404__frame::after,
    .vf-corner {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      border: 1px solid rgba(255,255,255,0.6);
      animation: vfGlow 5s ease-in-out infinite alternate;
    }
    .err404__frame::before { top: 0; left: 0; border-right: none; border-bottom: none; }
    .err404__frame::after  { top: 0; right: 0; border-left: none; border-bottom: none; }
    .vf-corner--bl { bottom: 0; left: 0; border-right: none; border-top: none; }
    .vf-corner--br { bottom: 0; right: 0; border-left: none; border-top: none; }

    .err404__frame { animation: vfBreath 5s ease-in-out infinite alternate; }

    @keyframes err404Focus { from { filter: blur(10px); opacity: 0; } to { filter: blur(0); opacity: 1; } }
    @keyframes vfBreath { from { transform: scale(1); } to { transform: scale(1.03); } }
    @keyframes vfGlow { from { opacity: 0.4; } to { opacity: 0.85; } }

    .err404__cta { justify-content: center; margin-top: 8px; }

    .err404__book {
      display: inline-block;
      margin-top: 24px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--muted);
      border-bottom: 0.5px solid var(--border);
      padding-bottom: 2px;
      transition: color 0.3s ease;
    }
    .err404__book:hover { color: var(--text); }

    @media (prefers-reduced-motion: reduce) {
      .err404 { animation: none; filter: none; opacity: 1; }
      .err404__frame,
      .err404__frame::before,
      .err404__frame::after,
      .vf-corner { animation: none; }
      .err404__frame::before,
      .err404__frame::after,
      .vf-corner { opacity: 0.7; }
    }
  </style>
